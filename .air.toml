# Air – live reload for Go apps (https://github.com/air-verse/air)
root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/loom ./cmd/loom"
  bin = "./tmp/loom"
  args_bin = ["serve"]
  include_ext = ["go", "sql", "yml", "yaml"]
  exclude_dir = ["tmp", "dist", "web", "node_modules", "config", "deploy", "docs", "scripts"]
  exclude_regex = ["_test\\.go$"]
  delay = 1000

[log]
  time = false

[misc]
  clean_on_exit = true
