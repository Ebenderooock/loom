---
id: eztv
name: EZTV
description: "EZTV is a Public torrent site for TV shows"
language: en-US
type: public
encoding: UTF-8
links:
  - https://eztvx.to/
  - https://eztv.wf/
  - https://eztv.tf/
  - https://eztv.yt/
  - https://eztv1.xyz/
legacylinks:
  - https://eztv.ag/
  - https://eztv.it/
  - https://eztv.ch/
  - https://eztv.io/
  - https://eztv.re/
  - https://eztv.li/

# EZTV's HTML search pages sit behind a Cloudflare managed challenge that
# FlareSolverr cannot reliably solve. Its JSON API (/api/get-torrents) is
# NOT challenged and responds in well under a second, so this definition
# talks to the API directly — matching Prowlarr's native EZTV indexer.
# The API filters only by IMDb id; keyword-only searches fall back to the
# recent feed and are filtered downstream by Loom.

caps:
  categorymappings:
    - {id: 1, cat: TV, desc: "TV"}

  modes:
    search: [q]
    tv-search: [q, imdbid, season, ep]

settings: []

search:
  paths:
    - path: "{{ if .Query.IMDBIDShort }}api/get-torrents?imdb_id={{ .Query.IMDBIDShort }}&limit=100&page=1{{ else }}api/get-torrents?limit=100&page=1{{ end }}"
      response:
        type: json

  rows:
    selector: torrents

  fields:
    category:
      text: 1
    title:
      selector: title
    magnet:
      selector: magnet_url
    infohash:
      selector: hash
    size:
      selector: size_bytes
    date:
      # unix timestamp
      selector: date_released_unix
    seeders:
      selector: seeds
    leechers:
      selector: peers
    downloadvolumefactor:
      text: 0
    uploadvolumefactor:
      text: 1
