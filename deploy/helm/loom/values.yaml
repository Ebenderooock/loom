# Default values for loom.

replicaCount: 1

image:
  repository: ghcr.io/ebenderooock/loom
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  fsGroup: 65534

securityContext:
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 65534
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  seccompProfile:
    type: RuntimeDefault
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 1925

# ---------- BitTorrent peer port ----------
# Exposes the built-in torrent client's listen port so inbound peer
# connections and DHT work. Behind NAT/in-cluster the pod is otherwise a
# "leech" (outbound-only): DHT-only magnets struggle to find peers and
# metadata resolution can time out. The port is preserved end-to-end so
# DHT/tracker announces (which advertise listenPort) stay correct.
#
# listenPort MUST match the port configured on the builtin/torrent
# download client in Loom (default 6881).
#
# For reachability from the public internet you must also port-forward
# WAN:listenPort -> <service IP>:listenPort on your router.
#
# publicIP4: The external IPv4 address that the torrent client should
# announce to trackers and DHT. Required in container/NAT environments
# where the internal pod IP differs from the external address. Set to the
# LoadBalancer service IP or your WAN IP (if port-forwarded).
torrent:
  listenPort: 6881
  publicIP4: ""
  publicIP6: ""
  # Metadata timeout for magnet URI resolution. Increased default (180s)
  # accommodates slow DHT/tracker responses in NAT/Kubernetes environments.
  # Can also be set via LOOM_TORRENT_METADATA_TIMEOUT_SECS env var.
  metadataTimeoutSecs: 180
  expose:
    enabled: false
    # LoadBalancer (e.g. MetalLB) is recommended because it preserves the
    # port. NodePort and ClusterIP are also accepted.
    type: LoadBalancer
    # Optional fixed IP for LoadBalancer services (honoured by MetalLB via
    # the metallb.io/loadBalancerIPs annotation). Empty = auto-assign.
    loadBalancerIP: ""
    # Preserve client source IPs (better peer/DHT behaviour). Only applied
    # for non-ClusterIP services.
    externalTrafficPolicy: Local
    annotations: {}
    # nodePort / nodePortUdp only apply when type is NodePort (30000-32767).
    nodePort: 0
    nodePortUdp: 0

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: loom.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources: {}
  # limits:
  #   cpu: 500m
  #   memory: 512Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

persistence:
  config:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 1Gi
    existingClaim: ""

  media:
    enabled: false
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 100Gi
    existingClaim: ""

# Extra volumes and mounts for media libraries, NFS, etc.
extraVolumes: []
extraVolumeMounts: []

# Extra environment variables
extraEnv: []
  # - name: LOOM_LOG_LEVEL
  #   value: debug

nodeSelector: {}
tolerations: []
affinity: {}

# Liveness/readiness probes hit the built-in healthcheck endpoint.
probes:
  liveness:
    enabled: true
    path: /api/v1/health
    initialDelaySeconds: 10
    periodSeconds: 30
    timeoutSeconds: 5
  readiness:
    enabled: true
    path: /api/v1/health
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
