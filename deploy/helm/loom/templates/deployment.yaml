{{- $legacyTorrentConfigured := hasKey .Values "torrent" -}}
{{- $rainEnabled := or (default false .Values.rain.enabled) $legacyTorrentConfigured -}}
{{- $rainRPCHost := default "127.0.0.1" .Values.rain.rpc.host -}}
{{- $rainRPCPort := default 7246 .Values.rain.rpc.port -}}
{{- $rainRPCTimeout := default 10 .Values.rain.rpc.timeoutSecs -}}
{{- $rainDownloadDir := default "/media/downloads" .Values.rain.downloadDir -}}
{{- $rainDHT := default true .Values.rain.dhtEnabled -}}
{{- $rainPEX := default true .Values.rain.pexEnabled -}}
{{- $rainInstallVersion := default "v2.3.1" .Values.rain.installVersion -}}
{{- $rainBuilderRepo := default "docker.io/golang" .Values.rain.image.repository -}}
{{- $rainBuilderTag := default "1.24-alpine" .Values.rain.image.tag -}}
{{- $rainBuilderPullPolicy := default "IfNotPresent" .Values.rain.image.pullPolicy -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "loom.fullname" . }}
  labels:
    {{- include "loom.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "loom.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "loom.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- if .Values.hostNetwork }}
      hostNetwork: true
      {{- end }}
      {{- if .Values.dnsPolicy }}
      dnsPolicy: {{ .Values.dnsPolicy }}
      {{- else if .Values.hostNetwork }}
      dnsPolicy: ClusterFirstWithHostNet
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "loom.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if $rainEnabled }}
      initContainers:
        - name: rain-install
          image: "{{ $rainBuilderRepo }}:{{ $rainBuilderTag }}"
          imagePullPolicy: {{ $rainBuilderPullPolicy }}
          command: ["/bin/sh", "-ec"]
          args:
            - |
              export GOPATH=/tmp/go
              export GOCACHE=/tmp/gocache
              export GOMODCACHE=/tmp/gomodcache
              export GOBIN=/rain-bin
              mkdir -p "$GOPATH" "$GOCACHE" "$GOMODCACHE" "$GOBIN"
              go install github.com/cenkalti/rain/v2@{{ $rainInstallVersion }}
              /rain-bin/rain --version || true
          volumeMounts:
            - name: rain-bin
              mountPath: /rain-bin
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            - name: LOOM_HTTP_ADDR
              value: ":{{ .Values.service.port }}"
            - name: LOOM_CONFIG_DIR
              value: /config
            - name: LOOM_DATA_DIR
              value: /config
            {{- if $rainEnabled }}
            - name: LOOM_RAIN_RPC_HOST
              value: "{{ $rainRPCHost }}"
            - name: LOOM_RAIN_RPC_PORT
              value: "{{ $rainRPCPort }}"
            - name: LOOM_RAIN_RPC_TIMEOUT_SECS
              value: "{{ $rainRPCTimeout }}"
            - name: LOOM_TORRENT_DOWNLOAD_DIR
              value: "{{ $rainDownloadDir }}"
            - name: LOOM_TORRENT_ENABLE_DHT
              value: "{{ $rainDHT }}"
            - name: LOOM_TORRENT_ENABLE_PEX
              value: "{{ $rainPEX }}"
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if .Values.probes.liveness.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
          {{- end }}
          {{- if .Values.probes.readiness.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /config
            {{- if .Values.persistence.media.enabled }}
            - name: media
              mountPath: /media
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
        {{- if $rainEnabled }}
        - name: rain
          image: "docker.io/alpine:3.20"
          imagePullPolicy: IfNotPresent
          command: ["/rain-bin/rain", "server", "--config", "/etc/rain/config.yaml"]
          env:
            - name: HOME
              value: /config
          volumeMounts:
            - name: rain-bin
              mountPath: /rain-bin
            - name: config
              mountPath: /config
            - name: rain-config
              mountPath: /etc/rain
              readOnly: true
            {{- if .Values.persistence.media.enabled }}
            - name: media
              mountPath: /media
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
        {{- end }}
      volumes:
        - name: config
          {{- if .Values.persistence.config.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.config.existingClaim | default (printf "%s-config" (include "loom.fullname" .)) }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- if .Values.persistence.media.enabled }}
        - name: media
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.media.existingClaim | default (printf "%s-media" (include "loom.fullname" .)) }}
        {{- end }}
        {{- if $rainEnabled }}
        - name: rain-config
          configMap:
            name: {{ include "loom.fullname" . }}-rain-config
        {{- end }}
        {{- if $rainEnabled }}
        - name: rain-bin
          emptyDir: {}
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
