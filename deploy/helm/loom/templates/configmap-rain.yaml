{{- if .Values.rain.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "loom.fullname" . }}-rain-config
  labels:
    {{- include "loom.labels" . | nindent 4 }}
data:
  config.yaml: |
    database: {{ printf "%s/session.db" .Values.rain.stateDir | quote }}
    data-dir: {{ .Values.rain.downloadDir | quote }}
    rpc-enabled: true
    rpc-host: {{ .Values.rain.rpc.host | quote }}
    rpc-port: {{ int .Values.rain.rpc.port }}
    dht-enabled: {{ .Values.rain.dhtEnabled }}
    pex-enabled: {{ .Values.rain.pexEnabled }}
    speed-limit-download: {{ int64 .Values.rain.speedLimitDownloadKBps }}
    speed-limit-upload: {{ int64 .Values.rain.speedLimitUploadKBps }}
{{- end }}
