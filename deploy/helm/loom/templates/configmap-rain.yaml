{{- $legacyTorrentConfigured := hasKey .Values "torrent" -}}
{{- $rain := (get .Values "rain") | default (dict) -}}
{{- $rainRPC := (get $rain "rpc") | default (dict) -}}
{{- $rainEnabled := or ((get $rain "enabled") | default false) $legacyTorrentConfigured -}}
{{- if $rainEnabled }}
{{- $rainRPCHost := (get $rainRPC "host") | default "127.0.0.1" -}}
{{- $rainRPCPort := (get $rainRPC "port") | default 7246 -}}
{{- $rainDownloadDir := (get $rain "downloadDir") | default "/media/downloads" -}}
{{- $rainDHT := (get $rain "dhtEnabled") | default true -}}
{{- $rainPEX := (get $rain "pexEnabled") | default true -}}
{{- $rainDLKB := (get $rain "speedLimitDownloadKBps") | default 0 -}}
{{- $rainULKB := (get $rain "speedLimitUploadKBps") | default 0 -}}
{{- $rainStateDir := (get $rain "stateDir") | default "/config/rain" -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "loom.fullname" . }}-rain-config
  labels:
    {{- include "loom.labels" . | nindent 4 }}
data:
  config.yaml: |
    database: {{ printf "%s/session.db" $rainStateDir | quote }}
    data-dir: {{ $rainDownloadDir | quote }}
    rpc-enabled: true
    rpc-host: {{ $rainRPCHost | quote }}
    rpc-port: {{ int $rainRPCPort }}
    dht-enabled: {{ $rainDHT }}
    pex-enabled: {{ $rainPEX }}
    speed-limit-download: {{ int64 $rainDLKB }}
    speed-limit-upload: {{ int64 $rainULKB }}
{{- end }}
