{{- $legacyTorrentConfigured := hasKey .Values "torrent" -}}
{{- $rainEnabled := or (default false .Values.rain.enabled) $legacyTorrentConfigured -}}
{{- if $rainEnabled }}
{{- $rainRPCHost := default "127.0.0.1" .Values.rain.rpc.host -}}
{{- $rainRPCPort := default 7246 .Values.rain.rpc.port -}}
{{- $rainDownloadDir := default "/media/downloads" .Values.rain.downloadDir -}}
{{- $rainDHT := default true .Values.rain.dhtEnabled -}}
{{- $rainPEX := default true .Values.rain.pexEnabled -}}
{{- $rainDLKB := default 0 .Values.rain.speedLimitDownloadKBps -}}
{{- $rainULKB := default 0 .Values.rain.speedLimitUploadKBps -}}
{{- $rainStateDir := default "/config/rain" .Values.rain.stateDir -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "loom.fullname" . }}-rain-config
  labels:
    {{- include "loom.labels" . | nindent 4 }}
data:
  config.yaml: |
    database: {{ printf "%s/session.db" $rainStateDir | quote }}
    data-dir: {{ $rainDownloadDir | quote }}
    rpc-enabled: true
    rpc-host: {{ $rainRPCHost | quote }}
    rpc-port: {{ int $rainRPCPort }}
    dht-enabled: {{ $rainDHT }}
    pex-enabled: {{ $rainPEX }}
    speed-limit-download: {{ int64 $rainDLKB }}
    speed-limit-upload: {{ int64 $rainULKB }}
{{- end }}
