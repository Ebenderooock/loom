name: Deploy Website

# Builds the marketing site in website/ and deploys it to Cloudflare
# Workers (static assets, project "wispy-wind-1fb6" — see website/wrangler.jsonc).
# Requires two repository secrets:
#   - CLOUDFLARE_API_TOKEN   (Workers Scripts: Edit permission)
#   - CLOUDFLARE_ACCOUNT_ID
on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - ".github/workflows/deploy-website.yml"
  workflow_dispatch: {}

concurrency:
  group: deploy-website-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Build & Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: website
          wranglerVersion: "4"
          command: deploy
