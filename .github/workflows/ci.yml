name: ci

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Day-to-day CI (push/PR) runs on GitHub-hosted Linux runners, which
        # are free for public repositories. The macOS/Windows legs that validate
        # the published cross-platform binaries are gated to release tags (v*),
        # so the full three-OS matrix only runs on tagged releases.
        #
        # Self-hosted runners are intentionally NOT used here: this workflow runs
        # on `pull_request`, so a self-hosted runner would execute untrusted code
        # from forked PRs on private infrastructure.
        os: ${{ github.ref_type == 'tag' && fromJSON('["ubuntu-latest", "macos-latest", "windows-latest"]') || fromJSON('["ubuntu-latest"]') }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
      - run: go mod download
      - run: go vet ./...
      # The race detector requires cgo + a C toolchain. GitHub-hosted runners
      # ship gcc, but the guard keeps this resilient if gcc is ever missing. The
      # disable_libutp tag drops the transitive go-libutp C++ dependency (which
      # the CGO_ENABLED=0 production build excludes anyway), so only gcc — not
      # g++ — is needed.
      - name: Ensure C compiler (for -race)
        if: runner.os == 'Linux'
        run: command -v gcc >/dev/null 2>&1 || { sudo apt-get update && sudo apt-get install -y gcc; }
      - run: go test -race -tags disable_libutp -count=1 -coverprofile=coverage.out ./...
        env:
          CGO_ENABLED: "1"
      - if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
      # golangci-lint's published binaries are built with an older Go that
      # refuses our go1.26 target ("Go language version used to build
      # golangci-lint is lower than the targeted Go version"), so build it from
      # source with the toolchain selected above. Only issues NEW relative to
      # the default branch fail CI; the existing backlog is grandfathered and
      # tracked for gradual cleanup.
      - name: Install golangci-lint (built with go1.26)
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
      # Grandfather the existing backlog: only issues NEW relative to the base
      # fail CI. For PRs that's the merge-base with the target branch; for
      # direct pushes it's the commit range that was pushed (so direct-to-main
      # pushes still catch regressions); tag/initial pushes fall back to the
      # default branch.
      - name: Run golangci-lint (new issues only)
        env:
          EVENT: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          BEFORE: ${{ github.event.before }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          if [ "$EVENT" = "pull_request" ]; then
            git fetch --no-tags origin "+${BASE_REF}:refs/remotes/origin/${BASE_REF}"
            golangci-lint run --new-from-merge-base="origin/${BASE_REF}" ./...
          elif [ -n "${BEFORE:-}" ] && [ "$BEFORE" != "0000000000000000000000000000000000000000" ]; then
            golangci-lint run --new-from-rev="${BEFORE}" ./...
          else
            git fetch --no-tags origin "+${DEFAULT_BRANCH}:refs/remotes/origin/${DEFAULT_BRANCH}"
            golangci-lint run --new-from-merge-base="origin/${DEFAULT_BRANCH}" ./...
          fi

  vuln:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      # Package-level scan flags vulnerable imported packages quickly; standard
      # library advisories are covered by tracking the latest go1.26 patch above.
      - run: govulncheck -scan package ./...

  build:
    name: Build matrix
    runs-on: ubuntu-latest
    needs: [go, lint]
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          - { goos: linux,   goarch: arm, goarm: "7" }
          - { goos: darwin,  goarch: amd64 }
          - { goos: darwin,  goarch: arm64 }
          - { goos: windows, goarch: amd64 }
          - { goos: freebsd, goarch: amd64 }
    env:
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
      GOARM: ${{ matrix.goarm }}
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
      - run: go build -trimpath -ldflags="-s -w" -o /tmp/loom ./cmd/loom

  web:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
