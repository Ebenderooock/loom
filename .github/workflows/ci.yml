name: ci

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Day-to-day CI (push/PR) runs ONLY on the self-hosted Kubernetes
        # runners — zero GitHub-hosted minutes. The macOS/Windows legs that
        # validate the published cross-platform binaries are gated to release
        # tags (v*), so they don't burn hosted minutes on every push.
        #
        # Later, to run cross-OS tests on your OWN machines: register them as
        # self-hosted runners and swap "macos-latest"/"windows-latest" below for
        # your runner labels. To run them on every push too, move those labels
        # into the base list (the `|| fromJSON('["arc-runners"]')` branch).
        os: ${{ github.ref_type == 'tag' && fromJSON('["arc-runners", "macos-latest", "windows-latest"]') || fromJSON('["arc-runners"]') }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - run: go mod download
      - run: go vet ./...
      - run: go test -race -count=1 -coverprofile=coverage.out ./...
      - if: matrix.os == 'arc-runners'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  lint:
    name: Lint
    runs-on: arc-runners
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  vuln:
    name: govulncheck
    runs-on: arc-runners
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...

  build:
    name: Build matrix
    runs-on: arc-runners
    needs: [go, lint]
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          - { goos: linux,   goarch: arm, goarm: "7" }
          - { goos: darwin,  goarch: amd64 }
          - { goos: darwin,  goarch: arm64 }
          - { goos: windows, goarch: amd64 }
          - { goos: freebsd, goarch: amd64 }
    env:
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
      GOARM: ${{ matrix.goarm }}
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - run: go build -trimpath -ldflags="-s -w" -o /tmp/loom ./cmd/loom

  web:
    name: Frontend
    runs-on: arc-runners
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
