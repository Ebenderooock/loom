name: ci

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Day-to-day CI (push/PR) runs ONLY on the self-hosted Kubernetes
        # runners — zero GitHub-hosted minutes. The macOS/Windows legs that
        # validate the published cross-platform binaries are gated to release
        # tags (v*), so they don't burn hosted minutes on every push.
        #
        # Later, to run cross-OS tests on your OWN machines: register them as
        # self-hosted runners and swap "macos-latest"/"windows-latest" below for
        # your runner labels. To run them on every push too, move those labels
        # into the base list (the `|| fromJSON('["arc-runners"]')` branch).
        os: ${{ github.ref_type == 'tag' && fromJSON('["arc-runners", "macos-latest", "windows-latest"]') || fromJSON('["arc-runners"]') }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - run: go mod download
      - run: go vet ./...
      # The race detector requires cgo + a C toolchain. The self-hosted runner
      # image sets CGO_ENABLED=0 and ships no compiler, so install gcc on Linux
      # and force cgo on for the test step. The disable_libutp tag drops the
      # transitive go-libutp C++ dependency (which the CGO_ENABLED=0 production
      # build excludes anyway), so only gcc — not g++ — is needed.
      - name: Ensure C compiler (for -race)
        if: runner.os == 'Linux'
        run: command -v gcc >/dev/null 2>&1 || { sudo apt-get update && sudo apt-get install -y gcc; }
      - run: go test -race -tags disable_libutp -count=1 -coverprofile=coverage.out ./...
        env:
          CGO_ENABLED: "1"
      - if: matrix.os == 'arc-runners'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  lint:
    name: Lint
    runs-on: arc-runners
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      # golangci-lint's published binaries are built with an older Go that
      # refuses our go1.26 target ("Go language version used to build
      # golangci-lint is lower than the targeted Go version"), so build it from
      # source with the toolchain selected above. Only issues NEW relative to
      # the default branch fail CI; the existing backlog is grandfathered and
      # tracked for gradual cleanup.
      - name: Install golangci-lint (built with go1.26)
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
      # Grandfather the existing backlog: only issues NEW relative to the base
      # fail CI. For PRs that's the merge-base with the target branch; for
      # direct pushes it's the commit range that was pushed (so direct-to-main
      # pushes still catch regressions); tag/initial pushes fall back to the
      # default branch.
      - name: Run golangci-lint (new issues only)
        env:
          EVENT: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          BEFORE: ${{ github.event.before }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          if [ "$EVENT" = "pull_request" ]; then
            git fetch --no-tags origin "+${BASE_REF}:refs/remotes/origin/${BASE_REF}"
            golangci-lint run --new-from-merge-base="origin/${BASE_REF}" ./...
          elif [ -n "${BEFORE:-}" ] && [ "$BEFORE" != "0000000000000000000000000000000000000000" ]; then
            golangci-lint run --new-from-rev="${BEFORE}" ./...
          else
            git fetch --no-tags origin "+${DEFAULT_BRANCH}:refs/remotes/origin/${DEFAULT_BRANCH}"
            golangci-lint run --new-from-merge-base="origin/${DEFAULT_BRANCH}" ./...
          fi

  vuln:
    name: govulncheck
    runs-on: arc-runners
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...

  build:
    name: Build matrix
    runs-on: arc-runners
    needs: [go, lint]
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          - { goos: linux,   goarch: arm, goarm: "7" }
          - { goos: darwin,  goarch: amd64 }
          - { goos: darwin,  goarch: arm64 }
          - { goos: windows, goarch: amd64 }
          - { goos: freebsd, goarch: amd64 }
    env:
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
      GOARM: ${{ matrix.goarm }}
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - run: go build -trimpath -ldflags="-s -w" -o /tmp/loom ./cmd/loom

  web:
    name: Frontend
    runs-on: arc-runners
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
