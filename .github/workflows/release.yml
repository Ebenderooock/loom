name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  goreleaser:
    # GitHub-hosted runners are unavailable on this account (spending limit), so
    # the release must run on the self-hosted ARC runners. These nodes are small
    # (~3.5Gi RAM), and building the modernc/sqlite-heavy binary for two arches
    # exhausted node memory and got the pod evicted mid-build. Mitigations below:
    # serialized builds (--parallelism 1) + capped compiler parallelism
    # (GOMAXPROCS), and the release is run against a single runner replica so the
    # build has the whole node. No QEMU: arc has no binfmt, and the goreleaser
    # Dockerfile is COPY-only so buildx assembles the arm64 image without it.
    runs-on: arc-runners
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: Build web UI
        # GoReleaser builds the binaries with `-tags embed`, which embeds
        # web/dist/* into the binary. web/dist is gitignored, so it must be
        # produced here first. Fail loudly if the build yields nothing.
        run: |
          cd web
          pnpm install --frozen-lockfile
          pnpm run build
          test -s dist/index.html
      - name: Build curated source tarball
        # Bundles tracked sources + the freshly built web/dist into
        # loom-source-v<version>.tar.gz, uploaded as a release asset via the
        # GoReleaser `release.extra_files` glob. Downstream packagers compile
        # this with `go build -tags embed` and no Node toolchain.
        run: |
          version="${GITHUB_REF_NAME#v}"
          prefix="loom-${version}"
          rm -rf .srcpkg
          mkdir -p ".srcpkg/${prefix}"
          git archive HEAD | tar -x -C ".srcpkg/${prefix}"
          mkdir -p ".srcpkg/${prefix}/web"
          cp -R web/dist ".srcpkg/${prefix}/web/dist"
          tar -czf "loom-source-v${version}.tar.gz" -C .srcpkg "${prefix}"
          rm -rf .srcpkg
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: anchore/sbom-action/download-syft@v0
      - uses: sigstore/cosign-installer@v3
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean --parallelism 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Cap compiler parallelism to keep peak memory within the small
          # (~3.5Gi) ARC node budget; modernc/sqlite is large to compile.
          GOMAXPROCS: "2"
