name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  goreleaser:
    # Releases are infrequent (tag pushes only) but heavy: multi-arch docker
    # buildx, SBOM generation and cosign signing. The self-hosted ARC runners
    # proved unreliable for this (no binfmt for QEMU, dind resource limits,
    # ephemeral pods recycled mid-build). A single release run on a
    # GitHub-hosted runner is ~15 min — negligible against the minutes budget,
    # which is protected by gating cross-OS CI to tags in ci.yml.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: Build web UI
        # GoReleaser builds the binaries with `-tags embed`, which embeds
        # web/dist/* into the binary. web/dist is gitignored, so it must be
        # produced here first. Fail loudly if the build yields nothing.
        run: |
          cd web
          pnpm install --frozen-lockfile
          pnpm run build
          test -s dist/index.html
      - name: Build curated source tarball
        # Bundles tracked sources + the freshly built web/dist into
        # loom-source-v<version>.tar.gz, uploaded as a release asset via the
        # GoReleaser `release.extra_files` glob. Downstream packagers compile
        # this with `go build -tags embed` and no Node toolchain.
        run: |
          version="${GITHUB_REF_NAME#v}"
          prefix="loom-${version}"
          rm -rf .srcpkg
          mkdir -p ".srcpkg/${prefix}"
          git archive HEAD | tar -x -C ".srcpkg/${prefix}"
          mkdir -p ".srcpkg/${prefix}/web"
          cp -R web/dist ".srcpkg/${prefix}/web/dist"
          tar -czf "loom-source-v${version}.tar.gz" -C .srcpkg "${prefix}"
          rm -rf .srcpkg
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: anchore/sbom-action/download-syft@v0
      - uses: sigstore/cosign-installer@v3
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
