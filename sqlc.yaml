# sqlc v1.31.1 — generates typed query code for both engines.
# Two configs share the same migration files (as schema source) but
# emit into separate packages: dbsqlite and dbpg.
version: "2"
sql:
  - engine: "sqlite"
    schema: "internal/storage/migrations/sqlite"
    queries: "internal/storage/queries/sqlite"
    gen:
      go:
        package: "dbsqlite"
        out: "internal/storage/db/sqlite"
        sql_package: "database/sql"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
        emit_empty_slices: true
  - engine: "postgresql"
    schema: "internal/storage/migrations/postgres"
    queries: "internal/storage/queries/postgres"
    gen:
      go:
        package: "dbpg"
        out: "internal/storage/db/postgres"
        sql_package: "database/sql"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
        emit_empty_slices: true
