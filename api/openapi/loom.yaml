openapi: 3.1.0
info:
  title: Loom API
  version: 0.1.0-alpha
  summary: Native HTTP API for Loom — unified media automation.
  description: |
    Loom's native API is served under `/api/v1/*`. Wire-compatible
    surfaces (`/api/v3/*` for Radarr / Sonarr, `/api/v1/*` for Prowlarr)
    are added in Phase 7 and are documented separately.

    This specification covers only the routes implemented today. The
    PR template requires every new route to be reflected here.
  license:
    name: AGPL-3.0-only
    identifier: AGPL-3.0-only
  contact:
    name: Loom maintainers
    url: https://github.com/loomctl/loom
servers:
  - url: http://localhost:8989
    description: Local dev server.
  - url: https://{host}
    description: Self-hosted instance behind a reverse proxy.
    variables:
      host:
        default: loom.example.com

tags:
  - name: health
    description: Liveness, readiness and metrics probes.
  - name: system
    description: Build / runtime metadata.
  - name: indexers
    description: Indexer CRUD, capabilities, manual health checks, and aggregated search.

paths:
  /healthz:
    get:
      tags: [health]
      summary: Liveness probe.
      operationId: getHealthz
      responses:
        "200":
          description: Process is up.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              examples:
                ok:
                  value: { status: ok }

  /livez:
    get:
      tags: [health]
      summary: Liveness probe (alias).
      operationId: getLivez
      responses:
        "200":
          description: Process is up.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              examples:
                alive:
                  value: { status: alive }

  /readyz:
    get:
      tags: [health]
      summary: Readiness probe — DB ping plus internal ready flag.
      operationId: getReadyz
      responses:
        "200":
          description: Ready to serve traffic.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              examples:
                ready:
                  value: { status: ready }
        "503":
          description: Not ready (still starting, or DB unreachable).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              examples:
                starting:
                  value: { status: starting }
                dbUnreachable:
                  value: { status: db unreachable }

  /metrics:
    get:
      tags: [health]
      summary: Prometheus metrics exposition.
      operationId: getMetrics
      responses:
        "200":
          description: Prometheus text exposition format.
          content:
            text/plain; version=0.0.4:
              schema:
                type: string
              examples:
                sample:
                  value: |
                    # HELP go_goroutines Number of goroutines that currently exist.
                    # TYPE go_goroutines gauge
                    go_goroutines 12

  /api/v1/system/status:
    get:
      tags: [system]
      summary: Build and runtime metadata.
      operationId: getSystemStatus
      responses:
        "200":
          description: Build metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemStatus"
              examples:
                sample:
                  value:
                    version: "0.1.0-alpha"
                    commit: "10bdae3"
                    buildDate: "2025-05-01T13:50:14Z"
                    engine: "sqlite"

  /api/v1/indexers/:
    get:
      tags: [indexers]
      summary: List configured indexers.
      operationId: listIndexers
      security:
        - apiKey: []
        - bearerAuth: []
        - cookieAuth: []
      responses:
        "200":
          description: Wrapped list of indexer definitions, each with the latest health row.
          content:
            application/json:
              schema:
                type: object
                required: [indexers]
                properties:
                  indexers:
                    type: array
                    items:
                      $ref: "#/components/schemas/IndexerWithHealth"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [indexers]
      summary: Create an indexer.
      operationId: createIndexer
      security:
        - apiKey: []
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IndexerCreate"
      responses:
        "201":
          description: Indexer created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Indexer"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/indexers/{id}:
    parameters:
      - $ref: "#/components/parameters/IndexerID"
    get:
      tags: [indexers]
      summary: Get an indexer.
      operationId: getIndexer
      security:
        - apiKey: []
        - bearerAuth: []
        - cookieAuth: []
      responses:
        "200":
          description: Indexer definition with latest health row.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IndexerWithHealth"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [indexers]
      summary: Replace an indexer.
      operationId: replaceIndexer
      security:
        - apiKey: []
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IndexerCreate"
      responses:
        "200":
          description: Updated indexer definition.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Indexer"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [indexers]
      summary: Partially update an indexer.
      operationId: patchIndexer
      security:
        - apiKey: []
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IndexerPatch"
      responses:
        "200":
          description: Updated indexer definition.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Indexer"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [indexers]
      summary: Delete an indexer.
      operationId: deleteIndexer
      security:
        - apiKey: []
        - bearerAuth: []
        - cookieAuth: []
      responses:
        "204":
          description: Indexer deleted.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/indexers/{id}/caps:
    parameters:
      - $ref: "#/components/parameters/IndexerID"
    get:
      tags: [indexers]
      summary: Capability descriptor for a single indexer.
      operationId: getIndexerCaps
      security:
        - apiKey: []
        - bearerAuth: []
        - cookieAuth: []
      responses:
        "200":
          description: Indexer capabilities.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Caps"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/indexers/{id}/test:
    parameters:
      - $ref: "#/components/parameters/IndexerID"
    post:
      tags: [indexers]
      summary: Run an immediate health check; persists the result.
      operationId: testIndexer
      security:
        - apiKey: []
        - bearerAuth: []
        - cookieAuth: []
      responses:
        "200":
          description: Outcome of the test plus measured latency. The same row is persisted into `indexer_health`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/indexers/search:
    post:
      tags: [indexers]
      summary: Fan-out search across enabled indexers.
      operationId: searchIndexers
      security:
        - apiKey: []
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchRequest"
      responses:
        "200":
          description: Aggregated results plus per-source error map.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AggregatedResults"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string
          description: Probe status verb.
          examples: [ok, alive, ready, starting, "db unreachable"]

    SystemStatus:
      type: object
      required: [version, commit, buildDate, engine]
      properties:
        version:
          type: string
          description: Loom semver (or `dev` for unstamped builds).
        commit:
          type: string
          description: Short git commit SHA.
        buildDate:
          type: string
          description: Build timestamp (RFC 3339, UTC).
        engine:
          type: string
          enum: [sqlite, postgres]
          description: Active storage engine.

    Indexer:
      type: object
      required: [id, kind, name, enabled, priority, categories, tags]
      properties:
        id:
          type: string
          description: Slug identifier; generated from kind+name when omitted on create.
        kind:
          type: string
          description: Factory key (e.g. `builtin/null`, `newznab`).
        name:
          type: string
        enabled:
          type: boolean
        priority:
          type: integer
          minimum: 0
          maximum: 100
        config:
          description: Free-form, kind-specific configuration object.
          type: object
          additionalProperties: true
        categories:
          type: array
          description: Newznab category IDs.
          items:
            type: integer
        tags:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    IndexerWithHealth:
      allOf:
        - $ref: "#/components/schemas/Indexer"
        - type: object
          properties:
            health:
              $ref: "#/components/schemas/IndexerHealth"

    IndexerCreate:
      type: object
      required: [kind, name]
      properties:
        id:
          type: string
        kind:
          type: string
        name:
          type: string
        enabled:
          type: boolean
          default: true
        priority:
          type: integer
          default: 25
        config:
          type: object
          additionalProperties: true
        categories:
          type: array
          items:
            type: integer
        tags:
          type: array
          items:
            type: string

    IndexerPatch:
      type: object
      description: Any subset of fields. Omitted fields are left untouched.
      properties:
        name:
          type: string
        enabled:
          type: boolean
        priority:
          type: integer
        config:
          type: object
          additionalProperties: true
        categories:
          type: array
          items:
            type: integer
        tags:
          type: array
          items:
            type: string

    IndexerHealth:
      type: object
      required: [indexer_id, status, last_checked_at]
      properties:
        indexer_id:
          type: string
        status:
          type: string
          enum: [ok, degraded, failed, unknown]
        last_checked_at:
          type: string
          format: date-time
        last_success_at:
          type: string
          format: date-time
        latency_ms:
          type: integer
          description: Round-trip time of the last `Test()` call, in milliseconds.
        last_error:
          type: string
          description: Last error message, if any.

    TestResult:
      type: object
      required: [ok, latency_ms]
      properties:
        ok:
          type: boolean
        latency_ms:
          type: integer
        error:
          type: string

    Caps:
      type: object
      required: [search_types, categories, supported_ids]
      properties:
        search_types:
          type: array
          description: Newznab-style search modes (e.g. `search`, `tv-search`, `movie-search`).
          items:
            type: string
        categories:
          type: array
          items:
            type: integer
        supported_ids:
          type: array
          description: External ID schemes accepted in searches (e.g. `imdb`, `tvdb`, `tmdb`).
          items:
            type: string

    SearchRequest:
      type: object
      required: [query]
      properties:
        query:
          type: string
        categories:
          type: array
          items:
            type: integer
        indexer_ids:
          type: array
          description: Restrict the fan-out to this subset of indexer IDs.
          items:
            type: string
        timeout_ms:
          type: integer
          description: Per-indexer ceiling override for this call only.

    Result:
      type: object
      required: [indexer_id, title, link]
      properties:
        indexer_id:
          type: string
        title:
          type: string
        link:
          type: string
          format: uri
        info_url:
          type: string
          format: uri
        size_bytes:
          type: integer
          format: int64
        seeders:
          type: integer
        leechers:
          type: integer
        publish_date:
          type: string
          format: date-time
        categories:
          type: array
          items:
            type: integer

    AggregatedResults:
      type: object
      required: [results, errors]
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/Result"
        errors:
          type: object
          description: Per-indexer error messages, keyed by indexer ID. Empty object when all sources succeeded.
          additionalProperties:
            type: string

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              examples: [bad_request, not_found, conflict, internal]
            message:
              type: string

  parameters:
    IndexerID:
      name: id
      in: path
      required: true
      schema:
        type: string

  responses:
    BadRequest:
      description: The request body or parameters could not be processed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Unauthorized:
      description: Missing or invalid credentials.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    NotFound:
      description: The requested resource does not exist.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Conflict:
      description: A resource with the same identifier already exists.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"

  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: X-Api-Key
      description: |
        Long-lived API key. Issued via the UI / `loom apikey` CLI in
        Phase 1c. Stored at rest as a SHA-256 hash plus a 4-character
        non-secret prefix.
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
      description: |
        Bearer token (placeholder for OIDC access tokens). Auth routes
        consuming this scheme land in Phase 1c.
    cookieAuth:
      type: apiKey
      in: cookie
      name: loom_session
      description: |
        HTTP-only session cookie issued by the forms-login flow.
        Auth routes consuming this scheme land in Phase 1c.

# Endpoints implemented today are intentionally unauthenticated; once
# the Phase 1c auth PR lands, security requirements will be applied
# at the operation level.
security: []
