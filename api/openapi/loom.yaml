openapi: 3.1.0
info:
  title: Loom API
  version: 0.1.0-alpha
  summary: Native HTTP API for Loom — unified media automation.
  description: |
    Loom's native API is served under `/api/v1/*`. Wire-compatible
    surfaces (`/api/v3/*` for Radarr / Sonarr, `/api/v1/*` for Prowlarr)
    are added in Phase 7 and are documented separately.

    This specification covers only the routes implemented today. The
    PR template requires every new route to be reflected here.
  license:
    name: AGPL-3.0-only
    identifier: AGPL-3.0-only
  contact:
    name: Loom maintainers
    url: https://github.com/loomctl/loom
servers:
  - url: http://localhost:8989
    description: Local dev server.
  - url: https://{host}
    description: Self-hosted instance behind a reverse proxy.
    variables:
      host:
        default: loom.example.com

tags:
  - name: health
    description: Liveness, readiness and metrics probes.
  - name: system
    description: Build / runtime metadata.
  - name: indexers
    description: Indexer CRUD, capabilities, manual health checks, and aggregated search.
  - name: proxies
    description: Outbound proxy records (HTTP/HTTPS/SOCKS5/FlareSolverr) attachable to indexers.
  - name: download-clients
    description: |
      Download client CRUD, manual health checks, and per-client operations
      (categories, free-space, item add/list/pause/resume). See
      `docs/downloads.md` and ADR-0014 for the design rationale.
  - name: aggregator
    description: |
      Prowlarr-compatible Newznab/Torznab aggregator surface. Wraps every enabled
      indexer behind a single endpoint that Sonarr/Radarr/Lidarr clients can be pointed
      at. See `docs/indexers-aggregator.md` for the full user guide and ADR-0011 for
      the design rationale.

paths:
  /healthz:
    get:
      tags: [health]
      summary: Liveness probe.
      operationId: getHealthz
      responses:
        "200":
          description: Process is up.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              examples:
                ok:
                  value: { status: ok }

  /livez:
    get:
      tags: [health]
      summary: Liveness probe (alias).
      operationId: getLivez
      responses:
        "200":
          description: Process is up.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              examples:
                alive:
                  value: { status: alive }

  /readyz:
    get:
      tags: [health]
      summary: Readiness probe — DB ping plus internal ready flag.
      operationId: getReadyz
      responses:
        "200":
          description: Ready to serve traffic.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              examples:
                ready:
                  value: { status: ready }
        "503":
          description: Not ready (still starting, or DB unreachable).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              examples:
                starting:
                  value: { status: starting }
                dbUnreachable:
                  value: { status: db unreachable }

  /metrics:
    get:
      tags: [health]
      summary: Prometheus metrics exposition.
      operationId: getMetrics
      responses:
        "200":
          description: Prometheus text exposition format.
          content:
            text/plain; version=0.0.4:
              schema:
                type: string
              examples:
                sample:
                  value: |
                    # HELP go_goroutines Number of goroutines that currently exist.
                    # TYPE go_goroutines gauge
                    go_goroutines 12

  /api/v1/system/status:
    get:
      tags: [system]
      summary: Build and runtime metadata.
      operationId: getSystemStatus
      responses:
        "200":
          description: Build metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemStatus"
              examples:
                sample:
                  value:
                    version: "0.1.0-alpha"
                    commit: "10bdae3"
                    buildDate: "2025-05-01T13:50:14Z"
                    engine: "sqlite"

  /api/v1/indexers/:
    get:
      tags: [indexers]
      summary: List configured indexers.
      operationId: listIndexers
      security:
        - apiKey: []
        - bearerAuth: []
        - cookieAuth: []
      responses:
        "200":
          description: Wrapped list of indexer definitions, each with the latest health row.
          content:
            application/json:
              schema:
                type: object
                required: [indexers]
                properties:
                  indexers:
                    type: array
                    items:
                      $ref: "#/components/schemas/IndexerWithHealth"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [indexers]
      summary: Create an indexer.
      operationId: createIndexer
      security:
        - apiKey: []
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IndexerCreate"
      responses:
        "201":
          description: Indexer created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Indexer"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/indexers/{id}:
    parameters:
      - $ref: "#/components/parameters/IndexerID"
    get:
      tags: [indexers]
      summary: Get an indexer.
      operationId: getIndexer
      security:
        - apiKey: []
        - bearerAuth: []
        - cookieAuth: []
      responses:
        "200":
          description: Indexer definition with latest health row.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IndexerWithHealth"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [indexers]
      summary: Replace an indexer.
      operationId: replaceIndexer
      security:
        - apiKey: []
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IndexerCreate"
      responses:
        "200":
          description: Updated indexer definition.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Indexer"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [indexers]
      summary: Partially update an indexer.
      operationId: patchIndexer
      security:
        - apiKey: []
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IndexerPatch"
      responses:
        "200":
          description: Updated indexer definition.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Indexer"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [indexers]
      summary: Delete an indexer.
      operationId: deleteIndexer
      security:
        - apiKey: []
        - bearerAuth: []
        - cookieAuth: []
      responses:
        "204":
          description: Indexer deleted.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/indexers/{id}/caps:
    parameters:
      - $ref: "#/components/parameters/IndexerID"
    get:
      tags: [indexers]
      summary: Capability descriptor for a single indexer.
      operationId: getIndexerCaps
      security:
        - apiKey: []
        - bearerAuth: []
        - cookieAuth: []
      responses:
        "200":
          description: Indexer capabilities.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Caps"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/indexers/{id}/test:
    parameters:
      - $ref: "#/components/parameters/IndexerID"
    post:
      tags: [indexers]
      summary: Run an immediate health check; persists the result.
      operationId: testIndexer
      security:
        - apiKey: []
        - bearerAuth: []
        - cookieAuth: []
      responses:
        "200":
          description: Outcome of the test plus measured latency. The same row is persisted into `indexer_health`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/indexers/search:
    post:
      tags: [indexers]
      summary: Fan-out search across enabled indexers.
      operationId: searchIndexers
      security:
        - apiKey: []
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchRequest"
      responses:
        "200":
          description: Aggregated results plus per-source error map.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AggregatedResults"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api:
    get:
      tags: [aggregator]
      summary: Newznab/Torznab aggregator (Prowlarr-compat path).
      description: |
        Single endpoint that fans a Newznab/Torznab query out across every enabled
        indexer and returns the merged result as RSS 2.0 with `newznab:` / `torznab:`
        extension elements. This is the canonical Prowlarr-compat path; Sonarr,
        Radarr, and Lidarr default to it. See `docs/indexers-aggregator.md` for the
        full parameter set, error semantics, and example client configuration.

        Authentication is via the `apikey` query parameter (or `X-Api-Key` header
        as a fallback). Errors are returned as Newznab-shape XML, not the JSON
        envelope used elsewhere in this spec.
      operationId: aggregatorRoot
      parameters:
        - in: query
          name: t
          required: true
          schema:
            type: string
            enum: [caps, search, movie, tvsearch, music, book]
          description: Newznab function to invoke.
        - in: query
          name: apikey
          required: true
          schema:
            type: string
          description: Loom API key (any active key).
        - in: query
          name: q
          schema: { type: string }
          description: Free-text search term.
        - in: query
          name: cat
          schema: { type: string }
          description: Comma-separated list of Newznab category IDs.
        - in: query
          name: limit
          schema: { type: integer, minimum: 1 }
        - in: query
          name: imdbid
          schema: { type: string }
          description: IMDb ID for `t=movie`.
        - in: query
          name: tmdbid
          schema: { type: string }
          description: TMDB ID for `t=movie`.
        - in: query
          name: tvdbid
          schema: { type: string }
          description: TVDB ID for `t=tvsearch`.
        - in: query
          name: season
          schema: { type: integer, minimum: 0 }
        - in: query
          name: ep
          schema: { type: integer, minimum: 0 }
      responses:
        "200":
          description: |
            RSS 2.0 channel with newznab/torznab extension elements (for searches),
            or a `<caps>` document (for `t=caps`). See the Newznab API spec for the
            full schema; Loom does not duplicate it here.
          content:
            application/xml:
              schema:
                type: string
                description: RSS 2.0 / caps XML document.
        "400":
          description: |
            Newznab-shape XML error document (not the JSON envelope used elsewhere).
          content:
            application/xml:
              schema:
                type: string
        "401":
          description: |
            Newznab-shape XML error document; missing or invalid apikey.
          content:
            application/xml:
              schema:
                type: string

  /api/v1/aggregate:
    get:
      tags: [aggregator]
      summary: Newznab/Torznab aggregator (Loom-namespaced alias).
      description: |
        Identical to `GET /api`. Provided so operators that already reverse-proxy
        `/api/v1/*` can keep the aggregator under the same prefix.
      operationId: aggregatorAlias
      parameters:
        - $ref: "#/paths/~1api/get/parameters/0"
        - $ref: "#/paths/~1api/get/parameters/1"
        - $ref: "#/paths/~1api/get/parameters/2"
        - $ref: "#/paths/~1api/get/parameters/3"
        - $ref: "#/paths/~1api/get/parameters/4"
        - $ref: "#/paths/~1api/get/parameters/5"
        - $ref: "#/paths/~1api/get/parameters/6"
        - $ref: "#/paths/~1api/get/parameters/7"
        - $ref: "#/paths/~1api/get/parameters/8"
        - $ref: "#/paths/~1api/get/parameters/9"
      responses:
        "200":
          description: See `GET /api`.
          content:
            application/xml:
              schema: { type: string }
        "400":
          description: See `GET /api`.
          content:
            application/xml:
              schema: { type: string }
        "401":
          description: See `GET /api`.
          content:
            application/xml:
              schema: { type: string }

  /api/v1/proxies/:
    get:
      tags: [proxies]
      summary: List configured outbound proxies.
      operationId: listProxies
      security:
        - apiKey: []
        - bearerAuth: []
        - cookieAuth: []
      responses:
        "200":
          description: Array of proxies wrapped in a `proxies` envelope.
          content:
            application/json:
              schema:
                type: object
                required: [proxies]
                properties:
                  proxies:
                    type: array
                    items:
                      $ref: "#/components/schemas/Proxy"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [proxies]
      summary: Create an outbound proxy.
      operationId: createProxy
      security:
        - apiKey: []
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProxyCreate"
      responses:
        "201":
          description: Newly persisted proxy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Proxy"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/proxies/{id}:
    parameters:
      - $ref: "#/components/parameters/ProxyID"
    get:
      tags: [proxies]
      summary: Fetch one proxy by ID.
      operationId: getProxy
      security:
        - apiKey: []
        - bearerAuth: []
        - cookieAuth: []
      responses:
        "200":
          description: Single proxy row.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Proxy"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [proxies]
      summary: Replace a proxy's full definition.
      operationId: replaceProxy
      security:
        - apiKey: []
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProxyCreate"
      responses:
        "200":
          description: Replaced proxy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Proxy"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [proxies]
      summary: Partially update a proxy.
      operationId: patchProxy
      security:
        - apiKey: []
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProxyPatch"
      responses:
        "200":
          description: Patched proxy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Proxy"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [proxies]
      summary: Delete a proxy.
      operationId: deleteProxy
      security:
        - apiKey: []
        - bearerAuth: []
        - cookieAuth: []
      responses:
        "204":
          description: Deleted.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: |
            One or more indexers still reference this proxy. The error envelope's
            `details.indexer_ids` enumerates them.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProxyInUseError"

  /api/v1/proxies/{id}/test:
    parameters:
      - $ref: "#/components/parameters/ProxyID"
    post:
      tags: [proxies]
      summary: Probe the proxy.
      description: |
        For HTTP/HTTPS/SOCKS5 proxies, fetches the configured probe URL
        through the proxy and reports status + latency. For FlareSolverr,
        issues a `sessions.list` command instead.
      operationId: testProxy
      security:
        - apiKey: []
        - bearerAuth: []
        - cookieAuth: []
      responses:
        "200":
          description: Probe outcome.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProxyTestResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/download-clients/:
    get:
      tags: [download-clients]
      summary: List configured download clients with their last-known health.
      operationId: listDownloadClients
      security:
        - apiKey: []
        - bearerAuth: []
        - cookieAuth: []
      responses:
        "200":
          description: All download clients.
          content:
            application/json:
              schema:
                type: object
                required: [download_clients]
                properties:
                  download_clients:
                    type: array
                    items:
                      $ref: "#/components/schemas/DownloadClient"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [download-clients]
      summary: Create a download client.
      operationId: createDownloadClient
      security:
        - apiKey: []
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DownloadClientCreate"
      responses:
        "201":
          description: Created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DownloadClient"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: A client with this id already exists.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/download-clients/{id}:
    parameters:
      - $ref: "#/components/parameters/DownloadClientID"
    get:
      tags: [download-clients]
      summary: Fetch a single download client + health.
      operationId: getDownloadClient
      security:
        - apiKey: []
        - bearerAuth: []
        - cookieAuth: []
      responses:
        "200":
          description: Found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DownloadClient"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [download-clients]
      summary: Replace a download client.
      operationId: replaceDownloadClient
      security:
        - apiKey: []
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DownloadClientCreate"
      responses:
        "200":
          description: Replaced.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DownloadClient"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [download-clients]
      summary: Partially update a download client.
      operationId: patchDownloadClient
      security:
        - apiKey: []
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DownloadClientPatch"
      responses:
        "200":
          description: Updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DownloadClient"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [download-clients]
      summary: Delete a download client.
      operationId: deleteDownloadClient
      security:
        - apiKey: []
        - bearerAuth: []
        - cookieAuth: []
      responses:
        "204":
          description: Deleted.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/download-clients/{id}/test:
    parameters:
      - $ref: "#/components/parameters/DownloadClientID"
    post:
      tags: [download-clients]
      summary: Probe a download client and persist the resulting health row.
      operationId: testDownloadClient
      security:
        - apiKey: []
        - bearerAuth: []
        - cookieAuth: []
      responses:
        "200":
          description: Probe outcome.
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean
                  error:
                    type: string
                  health:
                    $ref: "#/components/schemas/DownloadClientHealth"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/download-clients/{id}/categories:
    parameters:
      - $ref: "#/components/parameters/DownloadClientID"
    get:
      tags: [download-clients]
      summary: List categories advertised by the download client.
      operationId: listDownloadCategories
      security:
        - apiKey: []
        - bearerAuth: []
        - cookieAuth: []
      responses:
        "200":
          description: Categories.
          content:
            application/json:
              schema:
                type: object
                required: [categories]
                properties:
                  categories:
                    type: array
                    items:
                      $ref: "#/components/schemas/DownloadCategory"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/download-clients/{id}/free-space:
    parameters:
      - $ref: "#/components/parameters/DownloadClientID"
    get:
      tags: [download-clients]
      summary: Report free space (bytes) reported by the download client. -1 if unknown.
      operationId: getDownloadFreeSpace
      security:
        - apiKey: []
        - bearerAuth: []
        - cookieAuth: []
      responses:
        "200":
          description: Free-space report.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DownloadFreeSpace"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/download-clients/{id}/items:
    parameters:
      - $ref: "#/components/parameters/DownloadClientID"
    get:
      tags: [download-clients]
      summary: |
        List active items in the download client. Pass `?ids=a,b` (comma
        separated) to limit to specific item ids; omit for all.
      operationId: listDownloadItems
      security:
        - apiKey: []
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - name: ids
          in: query
          required: false
          schema:
            type: string
          description: Comma-separated item ids; empty/omitted = all.
      responses:
        "200":
          description: Items.
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/DownloadItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [download-clients]
      summary: Submit a new download (magnet, torrent URL, NZB URL, etc.).
      operationId: addDownloadItem
      security:
        - apiKey: []
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DownloadAddRequest"
      responses:
        "202":
          description: Accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DownloadAddResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/download-clients/{id}/pause:
    parameters:
      - $ref: "#/components/parameters/DownloadClientID"
    post:
      tags: [download-clients]
      summary: |
        Pause one or more items. Body `{"ids":["a","b"]}` is optional; an empty
        body pauses all active items.
      operationId: pauseDownloadItems
      security:
        - apiKey: []
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DownloadIDsRequest"
      responses:
        "200":
          description: OK.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/download-clients/{id}/resume:
    parameters:
      - $ref: "#/components/parameters/DownloadClientID"
    post:
      tags: [download-clients]
      summary: |
        Resume one or more items. Body `{"ids":["a","b"]}` is optional; an
        empty body resumes all paused items.
      operationId: resumeDownloadItems
      security:
        - apiKey: []
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DownloadIDsRequest"
      responses:
        "200":
          description: OK.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string
          description: Probe status verb.
          examples: [ok, alive, ready, starting, "db unreachable"]

    SystemStatus:
      type: object
      required: [version, commit, buildDate, engine]
      properties:
        version:
          type: string
          description: Loom semver (or `dev` for unstamped builds).
        commit:
          type: string
          description: Short git commit SHA.
        buildDate:
          type: string
          description: Build timestamp (RFC 3339, UTC).
        engine:
          type: string
          enum: [sqlite, postgres]
          description: Active storage engine.

    Indexer:
      type: object
      required: [id, kind, name, enabled, priority, categories, tags]
      properties:
        id:
          type: string
          description: Slug identifier; generated from kind+name when omitted on create.
        kind:
          type: string
          description: |
            Factory key. Built-in kinds: `builtin/null`. Real source
            kinds: `newznab`, `torznab`, `cardigann`.
          enum:
            - builtin/null
            - newznab
            - torznab
            - cardigann
        name:
          type: string
        enabled:
          type: boolean
        priority:
          type: integer
          minimum: 0
          maximum: 100
        config:
          description: |
            Free-form, kind-specific configuration. The shape is
            documented per kind; for `newznab` and `torznab` it
            matches `NewznabConfig`, for `cardigann` it matches
            `CardigannConfig`.
          oneOf:
            - $ref: "#/components/schemas/NewznabConfig"
            - $ref: "#/components/schemas/CardigannConfig"
            - type: object
              additionalProperties: true
        categories:
          type: array
          description: Newznab category IDs.
          items:
            type: integer
        tags:
          type: array
          items:
            type: string
        proxy_id:
          type: string
          description: Optional reference to a `proxies.id`. When set, all outbound HTTP traffic from this indexer is routed through the matching proxy row.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    IndexerWithHealth:
      allOf:
        - $ref: "#/components/schemas/Indexer"
        - type: object
          properties:
            health:
              $ref: "#/components/schemas/IndexerHealth"
            rate_limit:
              $ref: "#/components/schemas/IndexerRateLimit"

    IndexerRateLimit:
      type: object
      description: |
        Per-indexer rate-limit + retry configuration. The first three
        fields reflect the overrides stored on the row (any may be
        absent); the `effective_*` fields are what the runtime is
        actually applying after defaults are merged in.
      required: [effective_per_minute, effective_burst, effective_max_retries]
      properties:
        per_minute:
          type: integer
          minimum: 1
          description: Override for the token-bucket fill rate (req/min). Absent when the row stores NULL.
        burst:
          type: integer
          minimum: 1
          description: Override for the token-bucket capacity. Absent when the row stores NULL.
        max_retries:
          type: integer
          minimum: 0
          description: Override for the retry budget. Absent when the row stores NULL.
        effective_per_minute:
          type: integer
          description: Per-minute fill rate the runtime is using.
        effective_burst:
          type: integer
          description: Burst capacity the runtime is using.
        effective_max_retries:
          type: integer
          description: Retry budget the runtime is using.

    IndexerCreate:
      type: object
      required: [kind, name]
      properties:
        id:
          type: string
        kind:
          type: string
        name:
          type: string
        enabled:
          type: boolean
          default: true
        priority:
          type: integer
          default: 25
        config:
          type: object
          additionalProperties: true
        categories:
          type: array
          items:
            type: integer
        tags:
          type: array
          items:
            type: string
        proxy_id:
          type: string
          description: Optional `proxies.id` to attach on creation.
        rate_limit_per_min:
          type: integer
          minimum: 1
          description: Optional override for the token-bucket fill rate. Omit to use the package default (60 req/min).
        rate_limit_burst:
          type: integer
          minimum: 1
          description: Optional override for the token-bucket capacity. Omit to use the package default (5).
        retry_max_attempts:
          type: integer
          minimum: 0
          description: Optional override for the retry budget. Pass `0` to disable retries entirely; omit to use the package default (3).

    IndexerPatch:
      type: object
      description: Any subset of fields. Omitted fields are left untouched.
      properties:
        name:
          type: string
        enabled:
          type: boolean
        priority:
          type: integer
        config:
          type: object
          additionalProperties: true
        categories:
          type: array
          items:
            type: integer
        tags:
          type: array
          items:
            type: string
        proxy_id:
          type: string
          nullable: true
          description: Set to a proxy ID to pin outbound traffic. Send `null` (or empty string) to clear the existing pin.
        rate_limit_per_min:
          type: integer
          minimum: 1
          description: Set the token-bucket fill rate override. Omit to leave unchanged.
        rate_limit_burst:
          type: integer
          minimum: 1
          description: Set the token-bucket capacity override. Omit to leave unchanged.
        retry_max_attempts:
          type: integer
          minimum: 0
          description: Set the retry budget override. Pass `0` to disable retries; omit to leave unchanged.

    IndexerHealth:
      type: object
      required: [indexer_id, status, last_checked_at]
      properties:
        indexer_id:
          type: string
        status:
          type: string
          enum: [ok, degraded, failed, unknown]
        last_checked_at:
          type: string
          format: date-time
        last_success_at:
          type: string
          format: date-time
        latency_ms:
          type: integer
          description: Round-trip time of the last `Test()` call, in milliseconds.
        last_error:
          type: string
          description: Last error message, if any.

    NewznabConfig:
      type: object
      description: |
        Configuration shape used by both the `newznab` and `torznab`
        kinds. Operator slip-ups are tolerated: a trailing `/` on
        `url` is stripped, and an embedded `?apikey=` is extracted
        into `api_key` when that field is empty.
      required: [url, api_key]
      properties:
        url:
          type: string
          format: uri
          description: Base URL of the upstream feed (e.g. `https://nzbhydra.example/api`).
        api_key:
          type: string
          description: Per-indexer API key.
        user_agent:
          type: string
          description: Optional override for the outbound User-Agent header.
        timeout:
          type: string
          description: Go duration string (e.g. `30s`, `2m`). Default `30s`.
          example: 30s
        category_map:
          type: object
          description: Optional alias → upstream category IDs map (reserved for future use).
          additionalProperties:
            type: array
            items:
              type: integer

    CardigannConfig:
      type: object
      description: |
        Configuration shape used by the `cardigann` kind. The
        definition referenced by `definition_id` must already be
        present on disk under the configured `definitions_dir`
        (default `<data_dir>/definitions/cardigann/`); the API does
        not accept inline definitions to keep arbitrary remote YAML
        out of the trust boundary.
      required: [definition_id]
      properties:
        definition_id:
          type: string
          description: Filename (without `.yml`/`.yaml`) of the on-disk definition.
        username:
          type: string
          description: Tracker username (form-login flow).
        password:
          type: string
          description: Tracker password (form-login flow).
        passkey:
          type: string
          description: Optional per-user RSS / download passkey templated into search inputs.
        cookie:
          type: string
          description: |
            Pre-baked `name=value; name2=value2` cookie string, used
            when the tracker requires a manual session import instead
            of form login.
        credentials:
          type: object
          description: Free-form additional credentials exposed to login/search templates as `{{ .Config.<key> }}`.
          additionalProperties:
            type: string
        category_overrides:
          type: object
          description: |
            Operator override for site-category-id → Newznab-category-id
            mapping. Wins over the definition's `categorymappings`.
          additionalProperties:
            type: integer
        user_agent:
          type: string
          description: Optional override for the outbound User-Agent header.
        timeout:
          type: string
          description: Go duration string (e.g. `30s`, `2m`). Default `30s`.
          example: 30s


    TestResult:
      type: object
      required: [ok, latency_ms]
      properties:
        ok:
          type: boolean
        latency_ms:
          type: integer
        error:
          type: string

    Proxy:
      type: object
      required: [id, kind, name, enabled, config]
      properties:
        id:
          type: string
        kind:
          type: string
          enum: [http, https, socks5, flaresolverr]
        name:
          type: string
        enabled:
          type: boolean
        config:
          oneOf:
            - $ref: "#/components/schemas/ProxyHTTPConfig"
            - $ref: "#/components/schemas/ProxySOCKS5Config"
            - $ref: "#/components/schemas/ProxyFlareSolverrConfig"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ProxyCreate:
      type: object
      required: [kind, name, config]
      properties:
        id:
          type: string
        kind:
          type: string
          enum: [http, https, socks5, flaresolverr]
        name:
          type: string
        enabled:
          type: boolean
          default: true
        config:
          oneOf:
            - $ref: "#/components/schemas/ProxyHTTPConfig"
            - $ref: "#/components/schemas/ProxySOCKS5Config"
            - $ref: "#/components/schemas/ProxyFlareSolverrConfig"

    ProxyPatch:
      type: object
      description: Any subset of fields. When `kind` is supplied, `config` must match the new kind.
      properties:
        name:
          type: string
        enabled:
          type: boolean
        kind:
          type: string
          enum: [http, https, socks5, flaresolverr]
        config:
          oneOf:
            - $ref: "#/components/schemas/ProxyHTTPConfig"
            - $ref: "#/components/schemas/ProxySOCKS5Config"
            - $ref: "#/components/schemas/ProxyFlareSolverrConfig"

    ProxyHTTPConfig:
      type: object
      required: [url]
      description: Used by both `http` and `https` kinds.
      properties:
        url:
          type: string
          format: uri
          description: Proxy URL, e.g. `http://gateway:3128` or `https://gateway:3128`.
        username:
          type: string
        password:
          type: string

    ProxySOCKS5Config:
      type: object
      required: [address]
      properties:
        address:
          type: string
          description: SOCKS5 endpoint as `host:port`.
        username:
          type: string
        password:
          type: string

    ProxyFlareSolverrConfig:
      type: object
      required: [url]
      properties:
        url:
          type: string
          format: uri
          description: Base URL of the FlareSolverr instance (no trailing slash).
        max_timeout_ms:
          type: integer
          description: Per-request maxTimeout sent to FlareSolverr. Defaults to the kernel `flaresolverr_default_timeout`.
        session_mode:
          type: string
          enum: ["", none, shared]
          description: |
            `shared` lazily creates one FlareSolverr session per proxy row and
            reuses it across requests. Empty/`none` disables session reuse.

    ProxyTestResult:
      type: object
      required: [ok, latency_ms]
      properties:
        ok:
          type: boolean
        latency_ms:
          type: integer
        status_code:
          type: integer
          description: HTTP status returned by the probe (or FlareSolverr `sessions.list`).
        error:
          type: string

    ProxyInUseError:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              enum: [proxy_in_use]
            message:
              type: string
            details:
              type: object
              properties:
                indexer_ids:
                  type: array
                  items:
                    type: string

    Caps:
      type: object
      required: [search_types, categories, supported_ids]
      properties:
        search_types:
          type: array
          description: Newznab-style search modes (e.g. `search`, `tv-search`, `movie-search`).
          items:
            type: string
        categories:
          type: array
          items:
            type: integer
        supported_ids:
          type: array
          description: External ID schemes accepted in searches (e.g. `imdb`, `tvdb`, `tmdb`).
          items:
            type: string

    SearchRequest:
      type: object
      required: [query]
      properties:
        query:
          type: string
        categories:
          type: array
          items:
            type: integer
        indexer_ids:
          type: array
          description: Restrict the fan-out to this subset of indexer IDs.
          items:
            type: string
        timeout_ms:
          type: integer
          description: Per-indexer ceiling override for this call only.

    Result:
      type: object
      required: [indexer_id, title, link]
      properties:
        indexer_id:
          type: string
        title:
          type: string
        link:
          type: string
          format: uri
        info_url:
          type: string
          format: uri
        size_bytes:
          type: integer
          format: int64
        quality:
          type: string
          description: |
            Free-form release quality / release-group label
            (e.g. `1080p`, `WEB-DL`). Optional; not all indexers
            advertise this field.
        infohash:
          type: string
          description: |
            BitTorrent v1 infohash as a 40-character hex string.
            Empty for Usenet results and for torrent indexers that
            omit the attribute.
        seeders:
          type: integer
          nullable: true
          description: |
            Torrent seeder count reported by the indexer. Omitted
            (null) for Usenet results, where the concept does not
            apply. A value of `0` means "no seeders right now" and
            is distinct from "not reported".
        peers:
          type: integer
          nullable: true
          description: |
            Torrent peer count (seeders + leechers, per the Torznab
            spec). Omitted for Usenet results. When upstream reports
            only `leechers`, Loom synthesises this as
            `seeders + leechers`.
        magnet_uri:
          type: string
          description: |
            Optional `magnet:` link. Some trackers advertise one in
            addition to (or instead of) a `.torrent` `link`. Empty
            when not provided.
        publish_date:
          type: string
          format: date-time
        categories:
          type: array
          items:
            type: integer

    AggregatedResults:
      type: object
      required: [results, errors]
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/Result"
        errors:
          type: object
          description: Per-indexer error messages, keyed by indexer ID. Empty object when all sources succeeded.
          additionalProperties:
            type: string

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              examples: [bad_request, not_found, conflict, internal]
            message:
              type: string

    DownloadClient:
      type: object
      required: [id, name, kind, protocol, enabled, priority]
      properties:
        id:
          type: string
        name:
          type: string
        kind:
          type: string
          description: Kind identifier (e.g. `qbittorrent`, `transmission`, `builtin/null`).
        protocol:
          type: string
          enum: [torrent, usenet]
        enabled:
          type: boolean
        priority:
          type: integer
          description: Lower wins when multiple clients accept the same protocol.
        category_default:
          type: string
        save_path_default:
          type: string
        remove_completed:
          type: boolean
        remove_failed:
          type: boolean
        config:
          type: object
          description: Kind-specific JSON config blob.
          additionalProperties: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        health:
          $ref: "#/components/schemas/DownloadClientHealth"

    DownloadClientCreate:
      type: object
      required: [name, kind, protocol]
      properties:
        id:
          type: string
          description: Optional. Auto-generated if omitted.
        name:
          type: string
        kind:
          type: string
        protocol:
          type: string
          enum: [torrent, usenet]
        enabled:
          type: boolean
        priority:
          type: integer
        category_default:
          type: string
        save_path_default:
          type: string
        remove_completed:
          type: boolean
        remove_failed:
          type: boolean
        config:
          type: object
          additionalProperties: true

    DownloadClientPatch:
      type: object
      properties:
        name:
          type: string
        enabled:
          type: boolean
        priority:
          type: integer
        category_default:
          type: string
        save_path_default:
          type: string
        remove_completed:
          type: boolean
        remove_failed:
          type: boolean

    DownloadClientHealth:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [unknown, ok, warning, error]
        last_checked_at:
          type: string
          format: date-time
        last_error:
          type: string
        consecutive_failures:
          type: integer
        last_free_space_bytes:
          type: integer
          format: int64

    DownloadCategory:
      type: object
      required: [name]
      properties:
        name:
          type: string
        save_path:
          type: string

    DownloadFreeSpace:
      type: object
      required: [bytes]
      properties:
        bytes:
          type: integer
          format: int64
          description: Free space in bytes. -1 when the client cannot report it.

    SabnzbdConfig:
      type: object
      description: |
        Configuration blob for `kind: sabnzbd`. Persisted in the
        `download_clients.config` JSON column. SABnzbd 3.x and newer
        is required; the kind speaks the `output=json` API and
        authenticates with the operator's apikey on every request.
      required: [host, apikey]
      properties:
        host:
          type: string
          description: Hostname or IP of the SABnzbd Web UI.
        port:
          type: integer
          description: TCP port SABnzbd listens on (e.g. `8080`).
        tls:
          type: boolean
          description: Set to `true` when SABnzbd is served over HTTPS.
        base_path:
          type: string
          default: "/"
          description: |
            URL prefix when SABnzbd is behind a reverse proxy subpath
            (e.g. `/sabnzbd`). Defaults to `/`. The kind appends
            `api?...` to this path so a leading `/` is required.
        apikey:
          type: string
          format: password
          writeOnly: true
          description: |
            SABnzbd general API key. Find it in SABnzbd under
            Config → General → Security. Never returned on read
            responses.

    DownloadItem:
      type: object
      required: [id, name, status]
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
          description: Lifecycle verb (e.g. `queued`, `downloading`, `seeding`, `completed`, `paused`, `failed`).
        category:
          type: string
        save_path:
          type: string
        size_bytes:
          type: integer
          format: int64
        downloaded_bytes:
          type: integer
          format: int64
        progress:
          type: number
          format: float
        eta_seconds:
          type: integer
        ratio:
          type: number
          format: float
        error:
          type: string

    DownloadAddRequest:
      type: object
      description: |
        Submit a new download. Provide at least one of `magnet`, `url`, or
        `content` (base64). `category` and `save_path` override client defaults.
      properties:
        magnet:
          type: string
        url:
          type: string
        content:
          type: string
          format: byte
          description: Base64-encoded .torrent or .nzb file.
        category:
          type: string
        save_path:
          type: string
        paused:
          type: boolean

    DownloadAddResult:
      type: object
      required: [id]
      properties:
        id:
          type: string
        name:
          type: string

    DownloadIDsRequest:
      type: object
      description: |
        Optional body for pause/resume. Empty/omitted body acts on all matching
        items in the client.
      properties:
        ids:
          type: array
          items:
            type: string

  parameters:
    DownloadClientID:
      name: id
      in: path
      required: true
      schema:
        type: string
    IndexerID:
      name: id
      in: path
      required: true
      schema:
        type: string
    ProxyID:
      name: id
      in: path
      required: true
      schema:
        type: string

  responses:
    BadRequest:
      description: The request body or parameters could not be processed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Unauthorized:
      description: Missing or invalid credentials.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    NotFound:
      description: The requested resource does not exist.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Conflict:
      description: A resource with the same identifier already exists.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"

  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: X-Api-Key
      description: |
        Long-lived API key. Issued via the UI / `loom apikey` CLI in
        Phase 1c. Stored at rest as a SHA-256 hash plus a 4-character
        non-secret prefix.
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
      description: |
        Bearer token (placeholder for OIDC access tokens). Auth routes
        consuming this scheme land in Phase 1c.
    cookieAuth:
      type: apiKey
      in: cookie
      name: loom_session
      description: |
        HTTP-only session cookie issued by the forms-login flow.
        Auth routes consuming this scheme land in Phase 1c.

# Endpoints implemented today are intentionally unauthenticated; once
# the Phase 1c auth PR lands, security requirements will be applied
# at the operation level.
security: []
